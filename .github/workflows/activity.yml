name: GitHub Activity Keeper

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force run regardless of schedule"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run Activity Keeper
        env:
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_GITHUB_USERNAME: ${{ github.repository_owner }}
          INPUT_CONFIG_PATH: config.yaml
        run: python -m keeper
