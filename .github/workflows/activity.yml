name: GitHub Activity Keeper

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run Activity Keeper
        env:
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_GITHUB_USERNAME: ${{ github.repository_owner }}
          INPUT_GITHUB_EMAIL: ${{ vars.GITHUB_EMAIL || '' }}
          INPUT_CONFIG_PATH: config.yaml
          REMOTE_URL: ${{ github.server_url }}/${{ github.repository }}
        run: python -m app.main
